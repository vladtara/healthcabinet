name: Build & Push

# Builds production Docker images, scans them with Trivy before pushing,
# publishes to GitHub Container Registry, and updates the FluxCD kustomization.
# Triggered only on pushes to main that touch application or workflow files.

on:
  push:
    branches: [main]
    paths:
      - "healthcabinet/backend/**"
      - "healthcabinet/frontend/**"
      - ".github/workflows/build-push.yml"

# Serialise runs on main — newer push cancels in-flight older run so a stale
# SHA can never overwrite a newer kustomization commit in FluxCD.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      security-events: write  # upload SARIF findings to GitHub Security

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (local only — no push yet)
        uses: docker/build-push-action@v7
        with:
          context: ./healthcabinet/backend
          target: runner
          push: false
          load: true
          tags: ghcr.io/${{ github.repository_owner }}/healthcabinet-backend:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan with Trivy (block on CRITICAL CVEs)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/healthcabinet-backend:${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Push to GHCR
        run: docker push ghcr.io/${{ github.repository_owner }}/healthcabinet-backend:${{ github.sha }}

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      security-events: write  # upload SARIF findings to GitHub Security

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (local only — no push yet)
        uses: docker/build-push-action@v7
        with:
          context: ./healthcabinet/frontend
          target: runner
          push: false
          load: true
          tags: ghcr.io/${{ github.repository_owner }}/healthcabinet-frontend:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan with Trivy (block on CRITICAL CVEs)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/healthcabinet-frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

      - name: Push to GHCR
        run: docker push ghcr.io/${{ github.repository_owner }}/healthcabinet-frontend:${{ github.sha }}

  update-kustomization:
    name: Update FluxCD Image Tags
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build-backend, build-frontend]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kustomize (verified checksum)
        env:
          KUSTOMIZE_VERSION: v5.4.3
          KUSTOMIZE_SHA256: 3669470b454d865c8184d6bce78df05e977c9aea31c30df3c669317d43bcc7a7
        run: |
          curl -fsSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" \
            -o /tmp/kustomize.tar.gz
          echo "${KUSTOMIZE_SHA256}  /tmp/kustomize.tar.gz" | sha256sum -c -
          tar -xz -C /tmp -f /tmp/kustomize.tar.gz
          sudo install /tmp/kustomize /usr/local/bin/kustomize

      - name: Update image tags in kustomization
        run: |
          cd healthcabinet/k8s/overlays/prod
          kustomize edit set image \
            backend=ghcr.io/${{ github.repository_owner }}/healthcabinet-backend:${{ github.sha }}
          kustomize edit set image \
            frontend=ghcr.io/${{ github.repository_owner }}/healthcabinet-frontend:${{ github.sha }}

      - name: Commit and push image tag updates
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update image tags to ${{ github.sha }}"
          file_pattern: "healthcabinet/k8s/overlays/prod/kustomization.yaml"
