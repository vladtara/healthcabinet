name: Build & Push

# Builds production Docker images, scans them with Trivy before pushing,
# and publishes them to GitHub Container Registry.
# Triggered only on pushes to main that touch application or workflow files.

on:
  push:
    branches: [master]
    paths:
      - "healthcabinet/backend/**"
      - "healthcabinet/frontend/**"
      - ".github/workflows/build-push.yml"

# Serialise runs on main so older builds cannot finish after newer ones.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: Repository Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          persist-credentials: false

      - name: Scan repo for high-risk misconfigurations
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-repo-misconfig.sarif
          scanners: misconfig
          exit-code: "1"
          severity: HIGH,CRITICAL

      - name: Upload misconfiguration results
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        if: ${{ always() && hashFiles('trivy-repo-misconfig.sarif') != '' }}
        with:
          sarif_file: trivy-repo-misconfig.sarif
          category: trivy-repo-misconfig

      - name: Scan repo for leaked secrets
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-repo-secrets.sarif
          scanners: secret
          exit-code: "0"

      - name: Upload secret scan results
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        if: ${{ always() && hashFiles('trivy-repo-secrets.sarif') != '' }}
        with:
          sarif_file: trivy-repo-secrets.sarif
          category: trivy-repo-secrets

  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: security-scan
    permissions:
      contents: read
      packages: write
      security-events: write  # upload SARIF findings to GitHub Security

    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (local only — no push yet)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./healthcabinet/backend
          target: runner
          push: false
          load: true
          tags: ghcr.io/${{ github.repository_owner }}/healthcabinet-backend:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan with Trivy (block on HIGH and CRITICAL CVEs)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/healthcabinet-backend:${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        if: ${{ always() && hashFiles('trivy-backend.sarif') != '' }}
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Push to GHCR
        run: docker push ghcr.io/${{ github.repository_owner }}/healthcabinet-backend:${{ github.sha }}

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: security-scan
    permissions:
      contents: read
      packages: write
      security-events: write  # upload SARIF findings to GitHub Security

    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (local only — no push yet)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./healthcabinet/frontend
          target: runner
          push: false
          load: true
          tags: ghcr.io/${{ github.repository_owner }}/healthcabinet-frontend:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan with Trivy (block on HIGH and CRITICAL CVEs)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/healthcabinet-frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        if: ${{ always() && hashFiles('trivy-frontend.sarif') != '' }}
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

      - name: Push to GHCR
        run: docker push ghcr.io/${{ github.repository_owner }}/healthcabinet-frontend:${{ github.sha }}
