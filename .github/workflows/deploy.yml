name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: eu-central-1  # ONLY permitted region — health data never leaves EU
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-central-1.amazonaws.com

jobs:
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/healthcabinet-backend
          tags: |
            type=sha,prefix=,format=long

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./healthcabinet/backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/healthcabinet-frontend
          tags: |
            type=sha,prefix=,format=long

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./healthcabinet/frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-flux:
    name: Update FluxCD Image Tags
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Update backend image tag in kustomization
        run: |
          cd healthcabinet/k8s/overlays/prod
          kustomize edit set image backend=${{ env.ECR_REGISTRY }}/healthcabinet-backend:${{ github.sha }}

      - name: Update frontend image tag in kustomization
        run: |
          cd healthcabinet/k8s/overlays/prod
          kustomize edit set image frontend=${{ env.ECR_REGISTRY }}/healthcabinet-frontend:${{ github.sha }}

      - name: Commit and push image tag updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update image tags to ${{ github.sha }}"
          file_pattern: "healthcabinet/k8s/overlays/prod/kustomization.yaml"
