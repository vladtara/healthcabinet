apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend
  namespace: healthcabinet
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"  # Required for SSE connections (Epic 2)
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    - host: api.healthcabinet.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
