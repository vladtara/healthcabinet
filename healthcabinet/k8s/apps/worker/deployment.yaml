apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: healthcabinet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: backend:latest  # Same image as backend — different CMD
          command: ["python", "-m", "arq", "app.processing.worker.WorkerSettings"]
          envFrom:
            - secretRef:
                name: backend-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
