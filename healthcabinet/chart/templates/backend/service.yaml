apiVersion: v1
kind: Service
metadata:
  name: {{ include "healthcabinet.backend.fullname" . }}
  labels:
    {{- include "healthcabinet.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    {{- include "healthcabinet.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
