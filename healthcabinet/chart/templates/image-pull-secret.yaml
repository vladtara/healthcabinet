{{- if .Values.imagePullSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.imagePullSecret.name }}
  labels:
    {{- include "healthcabinet.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ required "imagePullSecret.dockerconfigjson is required when imagePullSecret.create=true" .Values.imagePullSecret.dockerconfigjson | quote }}
{{- end }}
