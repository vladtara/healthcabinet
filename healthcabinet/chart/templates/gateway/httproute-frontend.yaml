{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "healthcabinet.frontend.fullname" . }}
  labels:
    {{- include "healthcabinet.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
  hostnames:
    - {{ .Values.gateway.hostnames.frontend | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "healthcabinet.frontend.fullname" . }}
          port: {{ .Values.frontend.service.port }}
{{- end }}
