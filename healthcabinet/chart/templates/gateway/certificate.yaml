{{- if and .Values.gateway.enabled .Values.gateway.tls.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.gateway.tls.certManager.secretName }}
  labels:
    {{- include "healthcabinet.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.gateway.tls.certManager.secretName }}
  issuerRef:
    name: {{ .Values.gateway.tls.certManager.issuerName }}
    kind: {{ .Values.gateway.tls.certManager.issuerKind }}
  dnsNames:
    - {{ .Values.gateway.hostnames.frontend | quote }}
    - {{ .Values.gateway.hostnames.backend | quote }}
{{- end }}
